<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">less-robot social preview banner</title>
  <desc id="desc">A dark social preview image for the less-robot repository with project title, tagline, status pills, and the mascot illustration.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="30" x2="1180" y2="618" gradientUnits="userSpaceOnUse">
      <stop stop-color="#040814"/>
      <stop offset="0.55" stop-color="#0A1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="96" y1="96" x2="1184" y2="544" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#111B34" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(928 204) rotate(90) scale(210 250)">
      <stop stop-color="#60A5FA" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(356 520) rotate(90) scale(190 280)">
      <stop stop-color="#FB923C" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hood" x1="793" y1="181" x2="1038" y2="431" gradientUnits="userSpaceOnUse">
      <stop stop-color="#26344F"/>
      <stop offset="1" stop-color="#111B30"/>
    </linearGradient>
    <linearGradient id="mask" x1="835" y1="274" x2="980" y2="326" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#DDE7F5"/>
    </linearGradient>
    <linearGradient id="pencil" x1="1010" y1="212" x2="1128" y2="306" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" rx="40" fill="url(#bg)"/>
  <rect x="72" y="72" width="1136" height="496" rx="32" fill="url(#panel)" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="928" cy="212" r="220" fill="url(#blueGlow)"/>
  <circle cx="372" cy="514" r="200" fill="url(#orangeGlow)"/>

  <g opacity="0.35">
    <path d="M144 130H388" stroke="#60A5FA" stroke-width="2"/>
    <path d="M972 130H1128" stroke="#60A5FA" stroke-width="2"/>
    <path d="M1020 504H1136" stroke="#FB923C" stroke-width="2"/>
    <circle cx="136" cy="130" r="6" fill="#60A5FA"/>
    <circle cx="1136" cy="504" r="6" fill="#FB923C"/>
  </g>

  <g>
    <rect x="138" y="144" width="162" height="46" rx="23" fill="#101827" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="162" cy="167" r="8" fill="#FB923C"/>
    <text x="182" y="173" fill="#E5E7EB" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">release</text>
    <text x="248" y="173" fill="#F59E0B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">v1.1.0</text>

    <rect x="320" y="144" width="202" height="46" rx="23" fill="#101827" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="344" cy="167" r="8" fill="#1D9BF0"/>
    <text x="364" y="173" fill="#E5E7EB" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">follow on X</text>
    <text x="462" y="173" fill="#93C5FD" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">@sodiptabb23</text>

    <rect x="542" y="144" width="150" height="46" rx="23" fill="#101827" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="566" cy="167" r="8" fill="#2563EB"/>
    <text x="586" y="173" fill="#E5E7EB" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">license</text>
    <text x="649" y="173" fill="#93C5FD" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">MIT</text>
  </g>

  <text x="138" y="288" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="76" font-weight="800" letter-spacing="-2">less-robot</text>
  <text x="138" y="344" fill="#D6E0F0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="600">Make AI writing sound human without losing meaning</text>
  <text x="138" y="384" fill="#D6E0F0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="600">or technical precision.</text>

  <text x="138" y="452" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Humanizer skill + prompt pack for Hermes, Claude, Codex, OpenCode, and other LLM workflows.</text>
  <text x="138" y="494" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24">Cleaner writing. Less brochure language. More real signal.</text>

